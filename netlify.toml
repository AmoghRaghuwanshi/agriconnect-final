[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[functions]
  directory = "netlify/functions"

# ── Cron Schedules (IST = UTC+5:30) ─────────────────────────────────────────
# Mandi sync — 8:00 AM, 1:00 PM, 6:00 PM IST
[functions."mandi-sync"]
  schedule = "30 2,7,12 * * *"

# Standing orders — 12:00 AM IST (midnight)
[functions."standing-orders"]
  schedule = "30 18 * * *"

# Auto-complete deliveries — 2:00 AM IST
[functions."auto-complete-deliveries"]
  schedule = "30 20 * * *"

# Auto-close disputes — 3:00 AM IST
[functions."auto-close-disputes"]
  schedule = "30 21 * * *"

# Expire listings — 5:30 AM IST
[functions."expire-listings"]
  schedule = "0 0 * * *"
